<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTRA – Selecionar Tenant</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    body { overflow: auto; }

    .ts-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--navy-dark);
    }

    /* Topbar mínima */
    .ts-topbar {
      height: 52px;
      background: var(--navy-dark);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 10px;
      flex-shrink: 0;
    }

    .ts-topbar .logo-icon { width: 26px; height: 26px; }
    .ts-topbar .logo-text {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: var(--text-light);
      text-transform: uppercase;
    }

    .ts-topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ts-user {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .ts-logout {
      font-size: 0.78rem;
      color: rgba(180, 200, 240, 0.5);
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      padding: 3px 12px;
      cursor: pointer;
      font-family: inherit;
      font-style: italic;
      transition: background 0.2s, color 0.2s;
    }

    .ts-logout:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text-light);
    }

    /* Corpo */
    .ts-body {
      flex: 1;
      padding: 48px 52px;
    }

    .ts-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .ts-title {
      font-family: var(--sans);
      font-weight: 400;
      font-size: 2rem;
      color: var(--text-light);
      letter-spacing: 0.03em;
    }

    .ts-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 36px;
    }

    .ts-new-btn {
      font-family: var(--sans);
      font-size: 0.9rem;
      color: rgba(180, 200, 240, 0.7);
      background: none;
      border: 1px solid rgba(180, 200, 240, 0.2);
      border-radius: 3px;
      padding: 6px 18px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .ts-new-btn:hover {
      background: rgba(180, 200, 240, 0.08);
      border-color: rgba(180, 200, 240, 0.4);
      color: var(--text-light);
    }

    /* Grid de tenants */
    .tenant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .tenant-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 22px 24px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      position: relative;
      overflow: hidden;
    }

    .tenant-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(74,99,180,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .tenant-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(180, 200, 240, 0.2);
      transform: translateY(-2px);
    }

    .tenant-card:hover::before { opacity: 1; }

    .tc-name {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-light);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .tc-alias {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .tc-domain {
      font-size: 0.78rem;
      color: rgba(180, 200, 240, 0.35);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-style: italic;
    }

    .tc-arrow {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      color: rgba(180, 200, 240, 0.4);
      font-size: 1.2rem;
      transition: opacity 0.2s, right 0.2s;
    }

    .tenant-card:hover .tc-arrow {
      opacity: 1;
      right: 14px;
    }

    /* Estado vazio / carregando */
    .ts-empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.95rem;
      padding: 40px 0;
    }

    /* Erro */
    .ts-error {
      color: #c87070;
      font-style: italic;
      font-size: 0.88rem;
      margin-top: 12px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 18, 40, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(2px);
    }

    .modal-box {
      background: #1a2c5b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 32px 36px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text-light);
      letter-spacing: 0.04em;
    }

    .modal-field label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .modal-field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180, 200, 240, 0.2);
      padding: 7px 0;
      font-family: var(--sans);
      font-size: 0.98rem;
      color: var(--text-light);
      outline: none;
      transition: border-color 0.2s;
    }

    .modal-field input:focus {
      border-bottom-color: rgba(180, 200, 240, 0.5);
    }

    .modal-field input::placeholder {
      color: rgba(180, 200, 240, 0.2);
      font-style: italic;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-ghost {
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 3px;
      transition: color 0.2s;
    }

    .btn-ghost:hover { color: var(--text-light); }

    .btn-primary {
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--text-light);
      background: rgba(180, 200, 240, 0.12);
      border: 1px solid rgba(180, 200, 240, 0.25);
      border-radius: 3px;
      padding: 6px 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-primary:hover {
      background: rgba(180, 200, 240, 0.2);
      border-color: rgba(180, 200, 240, 0.4);
    }

    .modal-error {
      color: #c87070;
      font-size: 0.82rem;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="ts-wrap">

  <!-- Topbar -->
  <div class="ts-topbar">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 2L4 7.5V15c0 6.5 5.1 12.6 12 14 6.9-1.4 12-7.5 12-14V7.5L16 2z"
            fill="none" stroke="#dce4f5" stroke-width="1.5"/>
      <line x1="11" y1="11" x2="21" y2="21" stroke="#dce4f5" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="21" y1="11" x2="11" y2="21" stroke="#dce4f5" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="11" cy="11" r="2" fill="#dce4f5"/>
      <circle cx="21" cy="11" r="2" fill="#dce4f5"/>
      <circle cx="11" cy="21" r="2" fill="#dce4f5"/>
      <circle cx="21" cy="21" r="2" fill="#dce4f5"/>
    </svg>
    <span class="logo-text">Sentra</span>
    <div class="ts-topbar-right">
      <span class="ts-user" id="ts-user-email"></span>
      <button class="ts-logout" id="ts-logout">Sair</button>
    </div>
  </div>

  <!-- Corpo -->
  <div class="ts-body">
    <div class="ts-header">
      <div>
        <h1 class="ts-title">Tenants</h1>
        <p class="ts-subtitle">Selecione o tenant que deseja gerenciar</p>
      </div>
      <button class="ts-new-btn" id="btn-new-tenant">+ Novo tenant</button>
    </div>

    <div class="tenant-grid" id="tenant-grid">
      <p class="ts-empty">Carregando…</p>
    </div>
    <p class="ts-error" id="ts-error" style="display:none"></p>
  </div>

</div>

<!-- Modal criar tenant -->
<div class="modal-overlay" id="modal-new" style="display:none">
  <div class="modal-box">
    <h2 class="modal-title">Novo tenant</h2>

    <div class="modal-field">
      <label for="nt-name">Nome</label>
      <input type="text" id="nt-name" placeholder="Empresa XYZ" />
    </div>

    <div class="modal-field">
      <label for="nt-alias">alias</label>
      <input type="text" id="nt-alias" placeholder="empresa-xyz" />
    </div>

    <div class="modal-field">
      <label for="nt-domain">Domínio <span style="opacity:.5">(opcional)</span></label>
      <input type="text" id="nt-domain" placeholder="api.empresa.com" />
    </div>

    <p class="modal-error" id="nt-error" style="display:none"></p>

    <div class="modal-actions">
      <button class="btn-ghost" id="nt-cancel">Cancelar</button>
      <button class="btn-primary" id="nt-save">Criar</button>
    </div>
  </div>
</div>

<script type="module">
  import { tenantsApi, authApi } from './js/api.js';
  import { requireAuth, logout } from './js/auth.js';

  if (!requireAuth()) throw new Error('not authenticated');
  const me = await authApi.me();

  if (me.role !== 'superuser') {
    window.location.href = '/dashboard.html';
  }

  document.getElementById('ts-logout').addEventListener('click', logout);

  // Carrega email do usuário
  authApi.me().then(me => {
    document.getElementById('ts-user-email').textContent = me.email;
  }).catch(() => {});

  // Carrega tenants
  async function loadTenants() {
    const grid = document.getElementById('tenant-grid');
    const errEl = document.getElementById('ts-error');
    grid.innerHTML = '<p class="ts-empty">Carregando…</p>';
    errEl.style.display = 'none';

    try {
      const list = await tenantsApi.list();
      if (!list.length) {
        grid.innerHTML = '<p class="ts-empty">Nenhum tenant cadastrado.</p>';
        return;
      }
      grid.innerHTML = '';
      list.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tenant-card';
        card.innerHTML = `
          <div class="tc-name">${t.name}</div>
          <div class="tc-alias">${t.alias}</div>
          ${t.domain ? `<div class="tc-domain">${t.domain}</div>` : ''}
          <span class="tc-arrow">→</span>
        `;
        card.addEventListener('click', () => {
          sessionStorage.setItem('sentra_tenant', JSON.stringify({ id: t.id, name: t.name, alias: t.alias }));
          window.location.href = '/dashboard.html';
        });
        grid.appendChild(card);
      });
    } catch (err) {
      grid.innerHTML = '';
      errEl.textContent = err.detail || 'Erro ao carregar tenants.';
      errEl.style.display = 'block';
    }
  }

  loadTenants();

  // Modal novo tenant
  const modal = document.getElementById('modal-new');
  document.getElementById('btn-new-tenant').addEventListener('click', () => {
    modal.style.display = 'flex';
    document.getElementById('nt-name').focus();
  });
  document.getElementById('nt-cancel').addEventListener('click', () => {
    modal.style.display = 'none';
  });
  modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });

  document.getElementById('nt-save').addEventListener('click', async () => {
    const name   = document.getElementById('nt-name').value.trim();
    const alias   = document.getElementById('nt-alias').value.trim();
    const domain = document.getElementById('nt-domain').value.trim() || undefined;
    const errEl  = document.getElementById('nt-error');
    errEl.style.display = 'none';

    if (!name || !alias) {
      errEl.textContent = 'Nome e alias são obrigatórios.';
      errEl.style.display = 'block';
      return;
    }

    try {
      await tenantsApi.create({ name, alias, domain });
      modal.style.display = 'none';
      document.getElementById('nt-name').value = '';
      document.getElementById('nt-alias').value = '';
      document.getElementById('nt-domain').value = '';
      await loadTenants();
    } catch (err) {
      errEl.textContent = err.detail || 'Erro ao criar tenant.';
      errEl.style.display = 'block';
    }
  });
</script>

</body>
</html>
