<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTRA – Cadastro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 2L4 7.5V15c0 6.5 5.1 12.6 12 14 6.9-1.4 12-7.5 12-14V7.5L16 2z"
            fill="none" stroke="#dce4f5" stroke-width="1.5"/>
      <line x1="11" y1="11" x2="21" y2="21" stroke="#dce4f5" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="21" y1="11" x2="11" y2="21" stroke="#dce4f5" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="11" cy="11" r="2" fill="#dce4f5"/>
      <circle cx="21" cy="11" r="2" fill="#dce4f5"/>
      <circle cx="11" cy="21" r="2" fill="#dce4f5"/>
      <circle cx="21" cy="21" r="2" fill="#dce4f5"/>
    </svg>
    <span class="logo-text">Sentra</span>
  </header>

  <main>
    <div class="card">
      <h1 class="card-title">Cadastro</h1>
      <p style="font-size:.85rem;color:#7a8398;margin:-8px 0 16px 0">
        Crie sua conta e a empresa associada. Você será o admin do tenant.
      </p>

      <form id="register-form">
        <div class="field">
          <input
            type="email"
            id="email"
            placeholder="E-mail do administrador"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <input
            type="password"
            id="password"
            placeholder="Senha (mínimo 8 caracteres)"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>

        <div class="field">
          <input
            type="password"
            id="confirm-password"
            placeholder="Confirmar senha"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>

        <div class="field">
          <input
            type="text"
            id="company-name"
            placeholder="Nome da empresa"
            required
            maxlength="255"
          />
        </div>

        <div class="field">
          <input
            type="text"
            id="company-alias"
            placeholder="Alias da empresa (ex: minha-empresa)"
            required
            maxlength="128"
            pattern="^[a-z0-9]+(-[a-z0-9]+)*$"
            title="Apenas letras minúsculas, números e hífens"
          />
        </div>

        <p class="message" id="message"></p>

        <button class="btn" type="submit">Criar conta</button>
      </form>

      <div class="link-row" style="margin-top: 16px; text-align: center;">
        <a href="index.html">Já tem conta? Entrar</a>
      </div>
    </div>
  </main>

  <footer>
    <span>@2026</span>
  </footer>

  <script type="module" src="js/register.js"></script>
</body>
</html>
