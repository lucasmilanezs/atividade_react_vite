<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTRA – Redefinir Senha</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 2L4 7.5V15c0 6.5 5.1 12.6 12 14 6.9-1.4 12-7.5 12-14V7.5L16 2z"
            fill="none" stroke="#dce4f5" stroke-width="1.5"/>
      <line x1="11" y1="11" x2="21" y2="21" stroke="#dce4f5" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="21" y1="11" x2="11" y2="21" stroke="#dce4f5" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="11" cy="11" r="2" fill="#dce4f5"/>
      <circle cx="21" cy="11" r="2" fill="#dce4f5"/>
      <circle cx="11" cy="21" r="2" fill="#dce4f5"/>
      <circle cx="21" cy="21" r="2" fill="#dce4f5"/>
    </svg>
    <span class="logo-text">Sentra</span>
  </header>

  <main>
    <div class="card">
      <h1 class="card-title">Esqueceu a senha</h1>

      <div class="field">
        <input
          type="password"
          id="forgot-new"
          placeholder="Digite sua nova senha"
          autocomplete="new-password"
        />
      </div>

      <div class="field">
        <input
          type="password"
          id="forgot-confirm"
          placeholder="Confirme sua nova senha"
          autocomplete="new-password"
        />
      </div>

      <p class="msg" id="forgot-msg"></p>

      <button class="btn" onclick="handleForgotPassword()">Salvar</button>

      <div class="link-row" style="margin-top: 16px; text-align: center;">
        <a href="index.html">← Voltar ao login</a>
      </div>
    </div>
  </main>

  <footer>
    <span>@2026</span>
  </footer>

  <script src="js/forgot-password.js"></script>
</body>
</html>
